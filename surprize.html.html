<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>СЮРПРИЗ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #2d1f0f 0%, #4f3822 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 10px;
            position: relative;
            overflow: auto;
        }
        .confetti-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999999;
            overflow: hidden;
        }
        .confetti-piece {
            position: absolute;
            width: 12px;
            height: 22px;
            background: #ffb347;
            opacity: 0.8;
            transform: rotate(45deg);
            animation: fall 7s linear infinite;
            border-radius: 4px;
            box-shadow: 0 0 12px currentColor;
        }
        @keyframes fall {
            0% { transform: translateY(-20vh) rotate(0deg); opacity: 0.9; }
            100% { transform: translateY(120vh) rotate(720deg); opacity: 0.1; }
        }
        .message-block {
            background: #f7e9d7;
            background-image: repeating-linear-gradient(45deg, #f7e9d7 0px, #f7e9d7 15px, #ecd3aa 15px, #ecd3aa 30px);
            border-radius: 80px 20px 80px 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 20px 30px rgba(0,0,0,0.7), 0 0 0 8px #b6926c;
            border: 6px double #ffd966;
            max-width: 500px;
            width: 100%;
            z-index: 10000;
            position: relative;
            margin: 15px auto;
        }
        .message-text {
            font-size: 2.5rem;
            font-weight: 900;
            color: #3b2400;
            text-shadow: 4px 4px 0 #ffb347;
            line-height: 1.3;
            word-break: break-word;
            margin-bottom: 15px;
            background: #fff2bf;
            padding: 20px 15px;
            border-radius: 60px;
            border: 4px dotted #d45d00;
            animation: pulse 1.2s infinite alternate;
        }
        @keyframes pulse {
            from { text-shadow: 4px 4px 0 #ffb347; }
            to { text-shadow: 4px 4px 0 #ff8000, 0 0 25px orange; }
        }
        .sub-message {
            font-size: 1.5rem;
            color: #553d1a;
            background: #ffe6b0;
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="confetti-overlay" id="confettiOverlay"></div>

    <div class="message-block">
        <div class="message-text">
            Екатерина Александровна<br>ТОП!!!!!
        </div>
        <div class="sub-message">
            ✨ спасибо за год ✨
        </div>
    </div>

    <script>
        function generateRainbowConfetti() {
            const container = document.getElementById('confettiOverlay');
            for (let i = 0; i < 20; i++) {
                const c = document.createElement('div');
                c.classList.add('confetti-piece');
                const hue = Math.floor(Math.random() * 360);
                c.style.background = `hsl(${hue}, 90%, 65%)`;
                c.style.left = Math.random() * 100 + '%';
                c.style.animationDelay = Math.random() * 5 + 's';
                c.style.animationDuration = (Math.random() * 6 + 4) + 's';
                c.style.width = (Math.random() * 14 + 6) + 'px';
                c.style.height = (Math.random() * 24 + 14) + 'px';
                container.appendChild(c);
            }
        }
        window.onload = generateRainbowConfetti;
    </script>
</body>
</html>
